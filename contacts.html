<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Контакты</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
</head>
<body>

<div class="d-flex">
  <!-- Боковое меню -->
  <div class="d-flex flex-column p-3 bg-dark text-white" style="width: 220px; min-height: 100vh;">
    <h5 class="text-center mb-4">Меню</h5>
    <ul class="nav flex-column mb-5">
      <li class="nav-item">
        <a class="nav-link active" aria-current="page" href="#"><i class="bi bi-house"></i> Главная</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#"><i class="bi bi-journal"></i> Категории</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#"><i class="bi bi-card-checklist"></i> Заказы</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#"><i class="bi bi-person"></i> Контакты</a>
      </li>
    </ul>
    <div class="mt-auto">
      <div class="dropdown">
        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
          <i class="bi bi-person-circle"></i> Пользователь
        </a>
        <ul class="dropdown-menu">
          <li><a class="dropdown-item" href="#">Профиль</a></li>
          <li><a class="dropdown-item" href="#">Выход</a></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="flex-grow-1 d-flex justify-content-center align-items-start p-5">
    <div class="container">
      <div class="row g-4 justify-content-center">

        <div class="text-center mb-4 mt-5">
        <h2>Контакты</h2>
        </div>

        <div class="col-md-5">
          <h2 class="mb-4">Наши контакты</h2>
          <ul class="list-unstyled fs-5">
            <li class="mb-3"><i class="bi bi-geo-alt-fill me-2"></i>Адрес: ул. Уличная, д. 1, Москва</li>
            <li class="mb-3"><i class="bi bi-telephone-fill me-2"></i>Телефон: +7 (345) 123-45-67</li>
            <li class="mb-3"><i class="bi bi-envelope-fill me-2"></i>Email: info@example.com</li>
            <li class="mb-3"><i class="bi bi-clock-fill me-2"></i>Часы работы: Пн-Пт, 9:00–18:00</li>
          </ul>
        </div>

        <div class="col-md-5">
          <div class="p-4 bg-light rounded shadow-sm">
            <h2 class="mb-4">Связаться с нами</h2>
            <form>
              <div class="mb-3">
                <label for="name" class="form-label">Ваше имя</label>
                <input type="text" class="form-control" id="name" placeholder="Введите ваше имя">
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" placeholder="Введите ваш email">
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Сообщение</label>
                <textarea class="form-control" id="message" rows="4" placeholder="Введите ваше сообщение"></textarea>
              </div>
              <button type="submit" class="btn btn-primary w-100">Отправить</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.3/js/bootstrap.bundle.min.js">
</script>
</body>
</html>
